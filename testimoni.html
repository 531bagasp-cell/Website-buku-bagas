<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Usaha Buku Bagas Pratama</title>
<link rel ="stylesheet" href ="style.css"/>
<nav class="navbar">

    <li><a href="produk.html">Produk</a></li>
    <li><a href="Bedah buku Artikel.html">Bedah Buku Artikel</a></li>

    <li><a href="tampil testimoni.html">Testimoni Pembeli</a></li>
    <li><a href="video produk event.html">Video Produk Event</a></li>

  </ul>
</nav>
</head>
<body>
 <main class="formulir">
    <h2>Berikan Testimoni Anda</h2>
    <form id="formTestimoni">
      <h3>Name</h3>
      <label for="nama">Nama:</label>
      <input type="text" id="nama" name="nama" required placeholder="Nama lengkap">

      <h3>Email</h3>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required placeholder="email@example.com">

      <h3>Nomor HP</h3>
      <label for="nomor">Nomor HP:</label>
      <input type="tel" id="nomor" name="nomor" required placeholder="Nomor HP Anda">

      <h3>Buku Favorit</h3>
      <label for="buku">Buku Favorit:</label>
      <input type="text" id="buku" name="buku" required placeholder="Masukkan buku favorit Anda">

      <h3>Ulasan</h3>
      <label for="pesan">Testimoni Anda:</label>
      <textarea id="pesan" name="pesan" required placeholder="Tulis pengalaman Anda..." rows="5"></textarea>

      <button type="submit">Kirim Testimoni</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Toko Buku Bagas Pratama</p>
  </footer>

  <script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
      e.preventDefault();

      const nama = document.getElementById('nama').value;
      const email = document.getElementById('email').value;
      const nomor = document.getElementById('nomor').value;
      const buku = document.getElementById('buku').value;
      const pesan = document.getElementById('pesan').value;

      const dataBaru = { nama, email, nomor, buku, pesan };

      // Ambil list dari localStorage
      const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];

      // Tambahkan testimoni baru
      testimoniList.push(dataBaru);

      // Simpan kembali ke localStorage
      localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

      // Arahkan ke halaman konfirmasi
      window.location.href = 'proses testimoni.html';
    });
  </script>

</body>
</html>
